name: Streamlit Keep-Alive (Selenium)

on:
  schedule:
    - cron: "0 */4 * * *"   # Runs every 4 hours to reset the idle clock
  workflow_dispatch:          # Allows manual trigger for testing

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Selenium Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-keepalive.txt

      - name: Ping and Wake Streamlit App
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          python keep_alive.py

      - name: Keep workflow alive (avoid 60-day expiry)
        uses: gautamkrishnar/keepalive-workflow@v2
